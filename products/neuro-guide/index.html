<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>CROWBAH — Вход в нейросети (персональный гид)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a10; --bg2:#0a0e17; --panel:#0d1220; --panel2:#121821;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --text:#e6eaf0; --muted:#9aa6bd; --dim:#6b778f;
  --cyan:#34d3ee; --cyan2:#5fe0f5; --cyandim:#1c6675; --indigo:#5b78ff; --magenta:#ff5e7a; --green:#3ddc97;
  --fd:'Geologica',sans-serif; --fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--fd);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased}
@page{size:A4;margin:0}
.page{position:relative;width:210mm;height:297mm;padding:14mm 13mm 16mm;background:var(--bg);overflow:hidden;break-after:page;page-break-after:always}
.page:last-child{break-after:auto;page-break-after:auto}
.foot{position:absolute;left:13mm;right:13mm;bottom:7mm;display:flex;justify-content:space-between;font-family:var(--fm);font-size:7pt;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;border-top:1px solid var(--line);padding-top:5pt}
.foot b{color:var(--cyan);font-weight:500}
h1,h2,h3,h4{font-family:var(--fd);letter-spacing:-.02em;line-height:1.05}
b,strong{color:#fff;font-weight:600} em{color:var(--cyan2);font-style:normal}
.kick{font-family:var(--fm);font-size:7.6pt;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);display:flex;align-items:center;gap:8px}
.kick::before{content:"";width:20px;height:1px;background:var(--cyan)}

/* cover */
.cover{display:flex;flex-direction:column;justify-content:center;background:radial-gradient(120% 80% at 72% 12%,rgba(52,211,238,.10),transparent 55%),var(--bg)}
.cover .net{position:absolute;inset:0;opacity:.4}
.cover .brand{font-weight:900;font-size:16pt;letter-spacing:.04em;position:relative}
.cover .brand .x{color:var(--cyan)}
.cover .tag{font-family:var(--fm);font-size:8pt;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-top:6pt}
.cover h1{font-weight:900;font-size:46pt;line-height:.96;margin:24pt 0 0;max-width:15ch;position:relative}
.cover h1 .x{color:var(--cyan)}
.cover .sub{font-size:13pt;color:#cdd6e4;max-width:44ch;margin-top:16pt;line-height:1.5;position:relative}
.cover .meta{position:relative;margin-top:36pt;display:flex;gap:22pt;font-family:var(--fm);font-size:8.5pt;color:var(--muted)}
.cover .meta b{color:var(--cyan);font-weight:500}

/* section */
.shead{display:flex;align-items:flex-start;gap:14pt;margin-bottom:11pt}
.shead .no{font-weight:900;font-size:34pt;color:var(--cyan);line-height:.8;text-shadow:0 0 26px rgba(52,211,238,.35)}
.shead .ht{flex:1}
.shead .kk{font-family:var(--fm);font-size:7.4pt;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan)}
.shead h2{font-weight:800;font-size:18pt;margin-top:5pt;line-height:1.08}
.body{font-size:9.8pt;color:#cdd5e3;line-height:1.5}
.body p{margin:0 0 6pt}
.body b{color:#fff}
.body ul{margin:5pt 0 7pt;padding-left:0;list-style:none}
.body li{margin:0 0 4pt;padding-left:15pt;position:relative}
.body li::before{content:"—";position:absolute;left:0;color:var(--cyan)}

/* infographic shell */
.info{margin:12pt 0 0;border:1px solid var(--line);border-radius:13px;background:linear-gradient(180deg,var(--panel),var(--bg2));padding:15pt;position:relative;overflow:hidden;break-inside:avoid}
.cap{font-family:var(--fm);font-size:7pt;letter-spacing:.13em;text-transform:uppercase;color:var(--dim);margin-bottom:11pt;display:block}

/* stats3 + timeline */
.stats3{display:flex;gap:10pt}
.s3{flex:1;text-align:center;border:1px solid var(--line);border-radius:10px;background:var(--panel2);padding:12pt 8pt}
.s3 .g{font-size:16pt;color:var(--cyan);display:block;margin-bottom:6pt}
.s3 .t{font-weight:700;font-size:9.4pt;color:#fff;line-height:1.25}
.s3 .d{font-family:var(--fm);font-size:6.8pt;color:var(--muted);margin-top:5pt}
.tl{display:flex;align-items:center;gap:6pt;margin-top:13pt;font-family:var(--fm);font-size:8pt}
.tl .seg{flex:1;text-align:center;color:var(--dim)}
.tl .seg.now{color:var(--cyan);font-weight:700}
.tl .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--cyandim),var(--cyan))}

/* mega */
.megastat{text-align:center;padding:4pt 0 8pt}
.megastat .mega{font-weight:900;font-size:88pt;line-height:.82;color:var(--cyan);text-shadow:0 0 56px rgba(52,211,238,.4)}
.megastat .mega sup{font-size:38pt;vertical-align:super}
.megastat .megasub{font-size:10.5pt;color:var(--muted);margin-top:7pt}

/* vs */
.vs{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:0}
.vscol{padding:3pt 13pt}
.vscol.alt{border:1px solid var(--cyan);border-radius:12px;box-shadow:inset 0 0 0 1px rgba(52,211,238,.22)}
.vscol.dimcol{opacity:.6}
.vshd{font-weight:700;font-size:10pt;margin-bottom:8pt}
.vscol.alt .vshd{color:var(--cyan)}
.vsrow{display:flex;align-items:center;gap:8pt;font-size:9pt;color:#cdd5e3;padding:5pt 0;border-bottom:1px solid var(--line)}
.vsrow:last-child{border-bottom:0}
.vsrow .ic{font-family:var(--fm);font-size:8pt;min-width:20pt;flex:none;color:var(--cyan);white-space:nowrap}
.vsmid{display:flex;align-items:center;padding:0 9pt}
.vsmid span{font-weight:900;font-size:12pt;color:var(--dim);writing-mode:vertical-rl;text-orientation:upright;letter-spacing:-2pt}
.vsq{font-family:var(--fm);font-size:8pt;color:#cdd5e3;background:var(--panel2);border-radius:7px;padding:8pt;margin-bottom:7pt;line-height:1.45;min-height:46pt}
.note{margin-top:10pt;font-size:8.4pt;color:var(--dim);text-align:center;border-top:1px solid var(--line);padding-top:8pt}
.note b{color:var(--cyan)}

/* bento */
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:50pt;gap:9pt}
.bt{border:1px solid var(--line);border-radius:11px;background:var(--panel2);padding:11pt;position:relative}
.bt.main{grid-column:span 2;grid-row:span 2;border-color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(52,211,238,.3)}
.bt.dim{opacity:.55}
.bt .bn{font-weight:700;font-size:9.6pt;color:#fff}.bt.main .bn{font-size:13pt}
.bt .bd{font-family:var(--fm);font-size:6.8pt;color:var(--muted);margin-top:5pt;line-height:1.5}
.bt .badge{position:absolute;top:8pt;right:8pt;font-family:var(--fm);font-size:6.4pt;background:var(--cyan);color:#04121a;border-radius:5px;padding:2pt 6pt;text-transform:uppercase;font-weight:700}
.bt.dim .badge{background:transparent;color:var(--dim);border:1px solid var(--line)}
.bt .marks{display:flex;gap:5pt;flex-wrap:wrap;margin-top:8pt}
.bt .marks span{font-family:var(--fm);font-size:6.6pt;color:var(--cyan);border:1px solid rgba(52,211,238,.35);border-radius:999px;padding:2pt 6pt}

/* road */
.roadgrid{display:flex;justify-content:space-between;gap:5pt;margin-top:2pt}
.rnode{flex:1;text-align:center}
.rnode .circ{width:28pt;height:28pt;border-radius:50%;margin:0 auto 6pt;border:1.5px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-weight:700;font-size:8.4pt;color:var(--cyan);background:var(--panel2)}
.rnode .rt{font-family:var(--fm);font-size:7pt;color:#cdd5e3;line-height:1.4}
.shops{display:flex;gap:6pt;margin-top:14pt;justify-content:center;flex-wrap:wrap}
.shop{font-family:var(--fm);font-size:7.6pt;color:#cdd5e3;border:1px solid var(--line);border-radius:8px;padding:7pt 10pt}
.shop.rec{border-color:var(--cyan);color:var(--cyan)}

/* steps */
.steps{display:flex;gap:14pt}
.stepcol{flex:1}
.stp{display:flex;gap:11pt;margin-bottom:8pt}
.stp .sn{font-weight:900;font-size:15pt;color:var(--cyan);line-height:1;min-width:20pt;flex:none}
.stp .sx{font-size:8.8pt;color:#cdd5e3;line-height:1.4}
.stp .sx b{color:#fff}
.stopcol{flex:none;width:150pt;border-left:1px solid rgba(255,94,122,.3);padding-left:13pt}
.stopcol .sh{font-family:var(--fm);font-size:7.4pt;letter-spacing:.1em;text-transform:uppercase;color:var(--magenta);margin-bottom:8pt}
.stopcol .si{font-size:8.4pt;color:#e7c4cd;margin-bottom:6pt;padding-left:14pt;position:relative}
.stopcol .si::before{content:"✗";position:absolute;left:0;color:var(--magenta)}

/* table */
.gtab{width:100%;border-collapse:collapse;font-size:9pt}
.gtab th{font-family:var(--fm);font-size:7.2pt;letter-spacing:.05em;text-transform:uppercase;color:var(--cyan);text-align:left;padding:7pt 9pt;border-bottom:1px solid var(--line2)}
.gtab td{padding:7pt 9pt;border-bottom:1px solid var(--line);color:#cdd5e3;vertical-align:top}
.gtab tr td:first-child{color:#fff;font-weight:600}
.gtab .pr{font-family:var(--fm);color:var(--cyan);white-space:nowrap}
.totals{display:flex;gap:8pt;margin-top:11pt}
.totals .cap2{flex:1;text-align:center;border:1px solid var(--cyan);border-radius:8px;padding:9pt;font-family:var(--fm);font-size:8.4pt;color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(52,211,238,.2)}

/* json table */
.jtab{font-family:var(--fm);font-size:8.4pt;background:var(--panel2);border-left:2px solid var(--cyan);border-radius:0 8px 8px 0;padding:11pt 13pt;line-height:1.7}
.jtab .row{display:flex;gap:8pt;align-items:baseline}
.jtab .k{color:var(--cyan);min-width:78pt}
.jtab .v{color:#cdd5e3;flex:1}
.jtab .lock{font-size:7pt;color:var(--green)}
.jtab .swap{font-size:7pt;color:var(--cyan2)}
.jhint{display:flex;gap:14pt;margin-top:9pt;font-family:var(--fm);font-size:7.2pt}
.jhint span{color:var(--muted)} .jhint b.l{color:var(--green)} .jhint b.s{color:var(--cyan2)}

/* formula */
.formula{display:flex;align-items:stretch;gap:6pt;flex-wrap:wrap;justify-content:center}
.ftok{border:1px solid var(--cyandim);border-radius:10px;padding:9pt 10pt;text-align:center;min-width:68pt;background:var(--panel2)}
.ftok.hot{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(52,211,238,.3)}
.ftok .fl{font-family:var(--fm);font-size:6.6pt;letter-spacing:.05em;text-transform:uppercase;color:var(--cyan)}
.ftok .fv{font-size:8.4pt;color:#fff;margin-top:4pt}
.fplus{display:flex;align-items:center;color:var(--cyan);font-weight:700;font-size:12pt}
.frule{margin-top:12pt;font-family:var(--fm);font-size:8pt;color:var(--cyan2);text-align:center}

/* good vs bad */
.gb{display:grid;grid-template-columns:1fr 1fr;gap:0}
.gbcol{padding:5pt 13pt}
.gbcol.bad{opacity:.6;border-right:1px solid var(--line)}
.gbhd{font-family:var(--fm);font-size:7.6pt;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8pt}
.gbcol.bad .gbhd{color:var(--magenta)} .gbcol.good .gbhd{color:var(--cyan)}
.gbr{display:flex;gap:7pt;font-size:8.6pt;color:#cdd5e3;padding:5pt 0;border-bottom:1px solid var(--line)}
.gbr:last-child{border-bottom:0}
.gbr .m{font-family:var(--fm);width:13pt;flex:none}
.gbcol.bad .gbr .m{color:var(--magenta)} .gbcol.good .gbr .m{color:var(--cyan)}

/* cards 3x3 */
.grid9{display:grid;grid-template-columns:repeat(3,1fr);gap:7pt}
.gc{border:1px solid var(--line);border-radius:9px;background:var(--panel2);padding:9pt}
.gc .er{font-size:8pt;color:#e7c4cd;line-height:1.3}
.gc .er::before{content:"✗ ";color:var(--magenta)}
.gc .fx{font-family:var(--fm);font-size:7pt;color:var(--green);margin-top:6pt;padding-top:6pt;border-top:1px solid var(--line)}
.gc .fx::before{content:"✓ "}

/* checklist */
.chk{display:flex;gap:10pt;align-items:flex-start;margin-bottom:7pt}
.chk .box{width:13pt;height:13pt;border:1.5px solid var(--cyan);border-radius:3px;flex:none;margin-top:1pt}
.chk .ct{font-size:9pt;color:#cdd5e3;line-height:1.4}.chk .ct b{color:#fff}
.chkfin{margin-top:10pt;border:1px solid var(--cyan);border-radius:8px;padding:9pt 12pt;font-size:8.8pt;color:var(--cyan2);box-shadow:inset 0 0 0 1px rgba(52,211,238,.2)}
.chkfin::before{content:"✓ ";color:var(--cyan);font-weight:700}

/* flow */
.flow{display:flex;align-items:center;gap:7pt;flex-wrap:wrap}
.fcard{flex:1;min-width:84pt;border:1px solid var(--line);border-radius:9px;background:var(--panel2);padding:10pt;text-align:center}
.fcard.fin{border-color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(52,211,238,.3)}
.fcard .ftt{font-weight:600;font-size:8.6pt;color:#fff}
.fcard .fd{font-family:var(--fm);font-size:6.6pt;color:var(--muted);margin-top:4pt}
.fa{color:var(--cyan);font-weight:700}
.fnote{margin-top:11pt;font-size:8.4pt;color:var(--muted);text-align:center}

/* prompts */
.pcard{border:1px solid var(--line);border-radius:10px;background:var(--panel);margin:0 0 8pt;overflow:hidden;break-inside:avoid}
.pcard .ph{display:flex;justify-content:space-between;align-items:center;padding:7pt 11pt;border-bottom:1px solid var(--line);background:var(--panel2)}
.pcard .pl{font-weight:600;font-size:9pt;color:#fff}
.pcard .copy{font-family:var(--fm);font-size:6.6pt;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(52,211,238,.4);border-radius:5px;padding:2pt 7pt}
.pcard pre{font-family:var(--fm);font-size:8pt;line-height:1.5;color:#dbe6ef;padding:9pt 11pt;white-space:pre-wrap;word-break:break-word}
.jkey{color:var(--cyan)} .jstr{color:#cfe9c2} .jpunc{color:var(--dim)}
.split2{display:grid;grid-template-columns:1fr 1fr;gap:9pt}

/* offer */
.offer{display:flex;flex-direction:column;gap:8pt;margin-top:4pt}
.orow{border:1px solid var(--line);border-radius:10px;padding:12pt 15pt;background:var(--panel2);display:flex;justify-content:space-between;align-items:flex-start;gap:14pt;break-inside:avoid}
.orow.hot{border-color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(52,211,238,.3)}
.orow .ot{font-weight:700;font-size:11.5pt;color:#fff}
.orow .ot small{font-family:var(--fm);font-size:6.6pt;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:3pt}
.orow .od{font-size:8.8pt;color:var(--muted);margin-top:4pt;max-width:64ch;line-height:1.45}
.orow .op{font-weight:900;font-size:18pt;color:var(--cyan);white-space:nowrap;text-align:right}
.orow .op small{font-size:8.4pt;color:var(--muted);font-weight:500;display:block}
.contact{margin-top:14pt;border-top:1px solid var(--line);padding-top:12pt;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10pt}
.contact .who2{font-weight:700;font-size:11.5pt}.contact .who2 .x{color:var(--cyan)}
.contact .lk{font-family:var(--fm);font-size:8.6pt;color:#cdd5e3}.contact .lk b{color:var(--cyan)}
.disc{font-size:8.2pt;color:var(--dim);margin-top:9pt;line-height:1.5}
</style>
</head>

<div id="doc"></div>
<script>
const S = [
{n:"01",k:"Не магия. Инструмент, который понимает слова.",t:"Что такое нейросеть и почему сейчас",
b:`Представьте художника, фотографа и видеооператора, которые работают круглосуточно, без выходных и капризов, и берут в работу не техническое задание на трёх листах, а одну Вашу фразу. Это и есть нейросеть для изображений и видео. Вы описываете словами — она показывает картинку или ролик.

Машина не придумывает из головы. Она обучена на сотнях миллионов изображений и выучила связи — как выглядит «золотой час», «шёлковая ткань», «портрет в стиле Vogue». Когда Вы называете эти слова, она собирает из выученного именно то, что Вы попросили.

Почему входить стоит сейчас. За последний год качество резко выросло: то, что год назад выдавало пластиковые лица и лишние пальцы, сегодня делает фотографию, которую не отличить от съёмки на дорогую камеру. Видео заговорило — губы двигаются в такт звуку. Порог входа упал: больше не нужен компьютер за 300 тысяч, всё работает в браузере.

Вы заходите не поздно, а ровно вовремя — когда инструменты уже зрелые, но рынок ещё не переполнен. И освоить это реально за один-два вечера, а не за курс на полгода.`,
info:`<span class="cap">почему сейчас — и почему это просто</span>
<div class="stats3">
<div class="s3"><span class="g">✎</span><div class="t">1 фраза → ∞ кадров</div><div class="d">описали словами — получили</div></div>
<div class="s3"><span class="g">◉</span><div class="t">не отличить от фото</div><div class="d">камера больше не нужна</div></div>
<div class="s3"><span class="g">▢</span><div class="t">0 спецтехники</div><div class="d">всё в окне браузера</div></div>
</div>
<div class="tl"><span class="seg">2023 · пластик</span><span class="ln"></span><span class="seg">2024 · реализм</span><span class="ln"></span><span class="seg now">2026 · вы здесь</span></div>`},

{n:"02",k:"8 из 10 результата — это слова, которые Вы подобрали.",t:"Всё решает описание",
b:`Здесь главная развилка между «у меня выходит ерунда» и «у меня выходит шедевр». Дело почти никогда не в нейросети — дело в том, что Вы ей сказали.

Сравните две просьбы. Первая: «женщина в платье». Машина не знает, какая женщина, какое платье, где, при каком свете, снято на что — додумает за Вас, усреднённо и скучно. Вторая: «женщина 45 лет, благородные черты, в шёлковом изумрудном платье, у панорамного окна, мягкий свет золотого часа, снято на 85 мм, малая глубина резкости, фотореализм». Та же нейросеть выдаст совсем другой уровень.

Разница не в таланте машины, а в том, что во втором случае Вы взяли роль режиссёра: задали героиню, костюм, локацию, свет, оптику. Машина просто исполнила.

Это хорошая новость: результат в Ваших руках, а не в лотерее. Не нужно уметь рисовать — нужно точно описывать то, что Вы и так прекрасно представляете. Но и чуда без описания не будет: пустую фразу не спасёт никакая нейросеть. Дальше — формула, по которой собирается крепкое описание.`,
info:`<span class="cap">один инструмент — два результата</span>
<div class="vs">
<div class="vscol dimcol"><div class="vshd">✗ бедный запрос</div><div class="vsq">«женщина в платье»</div><div style="font-family:var(--fm);font-size:7.6pt;color:var(--dim)">машина усредняет → плоско и скучно</div></div>
<div class="vsmid"><span>80%</span></div>
<div class="vscol alt"><div class="vshd">✓ запрос-режиссура</div><div class="vsq">«женщина 45, шёлковое изумрудное платье, золотой час, 85 мм, малая ГРИП, фотореализм»</div><div style="font-family:var(--fm);font-size:7.6pt;color:var(--cyan)">машина исполняет → дорогой кадр</div></div>
</div>
<div class="note">столько результата делают <b>слова</b>, а не цена подписки</div>`},

{n:"03",k:"Лучший инструмент для фото, бренда и текста на картинке.",t:"Картинки: Nano Banana Pro",
b:`Для изображений Ваш главный инструмент — Nano Banana Pro (официальное имя — Gemini 3 Pro Image). На сегодня это лучшее, что доступно для серьёзной работы.

Первое — текст внутри картинки. Большинство нейросетей пишут нечитаемую кашу из букв. Этот делает чистый, аккуратный текст: афиша, обложка, пост с надписью, упаковка, меню.

Второе — постоянство лица и бренда. Вы держите одного персонажа или один фирменный стиль от картинки к картинке. Так разовые кадры превращаются в систему: узнаваемая героиня, единая эстетика ленты.

Третье — разрешение до 4K: картинку не стыдно напечатать или увеличить.

Доступ. Pro-версия входит в подписку Google AI Pro — около 20 долларов в месяц (примерно 2000—2200 ₽). Есть и обычная Nano Banana: быстрее, бесплатный лимит около двух картинок в день — попробовать на вкус, но без фирменного текста и 4K.

Честная деталь: все картинки получают невидимую метку SynthID — технический маркер генерации. На вид это никак не влияет, но знать полезно.`,
info:`<span class="cap">приоритет по картинкам</span>
<div class="bento">
<div class="bt main"><span class="badge">№1</span><div class="bn">Nano Banana Pro</div><div class="bd">= Gemini 3 Pro Image. Лучший выбор для серьёзной работы.</div><div class="marks"><span>текст в кадре ✓</span><span>одно лицо</span><span>до 4K</span></div></div>
<div class="bt"><div class="bn">Google AI Pro</div><div class="bd">≈$20/мес · ~2100 ₽ — сюда входит Pro</div></div>
<div class="bt dim"><span class="badge">free</span><div class="bn">обычная Nano Banana</div><div class="bd">~2 картинки/день, без 4K и текста</div></div>
</div>`},

{n:"04",k:"Картинка оживает: движение, звук, губы в такт.",t:"Видео: Seedance",
b:`Когда освоите картинки — следующий шаг видео. Ваш инструмент здесь Seedance от ByteDance (создатели TikTok, в видео сильны как никто).

Рабочая версия — Seedance 2.0: оживляет Ваш текст или Вашу картинку в ролик, добавляет звук, синхронизирует губы с речью (lip-sync), даёт до 2K и слушается команд по камере — наезд, облёт, панорама. Вы получаете не двигающуюся картинку, а маленькую кинематографичную сцену.

Версия 2.5 пока в энтерпрайз-бете (публично ждут к июлю 2026). Ждать не нужно — 2.0 уже силён.

Доступ. Напрямую из России Seedance не работает — идём через сервисы-витрины, которые встроили его у себя: Higgsfield (≈15 $/мес, советую как старт — ~200 кредитов), Dreamina (≈20 $, две бесплатные пробы), Freepik (≈10 $), CapCut Pro (≈20 $). Начинать дешевле там, где лимит на пробу больше.

И честно: после исков кинокомпаний встроен фильтр на узнаваемые лица знаменитостей. Для Вашего собственного портрета это даже к лучшему — но оживить фото звезды система мягко заблокирует.`,

{n:"05",k:"Два разных барьера. Решаются по-разному.",t:"Главное препятствие: доступ и оплата из РФ",
b:`Честно и без иллюзий: из России два отдельных препятствия, и их часто путают.

Барьер первый — доступ. Сервис не открывается, потому что видит российский IP-адрес. Это решает VPN — он подменяет Ваше «местоположение» в сети. Но VPN решает ТОЛЬКО открытие сайта. Платёж он не чинит.

Барьер второй — оплата. Российскую карту отбивают по двум признакам: по самой карте (видят, что выпущена в РФ) и по стране Вашего аккаунта. Даже с VPN карта не пройдёт.

Отсюда вывод: нужны два решения сразу — VPN, чтобы войти и работать, и обходной способ оплаты, чтобы оформить подписку. Одно не заменяет другое. Частая ошибка новичка: поставил VPN, сайт открылся, а на оплате упёрся в стену и решил, что «ничего не работает».

Как платят безопасно: подписку оформляют НА ВАШ аккаунт через проверенного посредника, рублями. Вы остаётесь хозяйкой аккаунта, отдаёте только email — никогда пароль. Подробный разбор VPN и оплаты — на следующих страницах. Это не «нельзя», это «нужно знать как».`,
info:`<span class="cap">два барьера — два решения</span>
<div class="vs">
<div class="vscol dimcol"><div class="vshd">Барьер 1 · ДОСТУП</div><div class="vsrow"><span class="ic">✗</span> сайт не открывается (РФ-IP)</div><div class="vsrow"><span class="ic">→</span> решение: <b style="color:var(--green)">&nbsp;VPN</b></div></div>
<div class="vsmid"><span>+</span></div>
<div class="vscol alt"><div class="vshd">Барьер 2 · ОПЛАТА</div><div class="vsrow"><span class="ic">✗</span> карта РФ не проходит</div><div class="vsrow"><span class="ic">→</span> решение: <b style="color:var(--cyan)">&nbsp;посредник + СБП</b></div></div>
</div>
<div class="note"><b>VPN ≠ оплата.</b> Нужны ОБА.</div>`},

{n:"06",k:"Что поставить, как настроить, чего не делать.",t:"VPN — пошагово",
b:`VPN — Ваш ключ к двери. Делаем правильно с первого раза. Если после всех шагов сайт всё равно не открылся — почти всегда виноват «засвеченный» адрес из шага 2: смените сервер на другой в той же стране или возьмите вариант с обфускацией.`,
info:`<span class="cap">пять шагов · и чего не делать</span>
<div class="steps">
<div class="stepcol">
<div class="stp"><div class="sn">1</div><div class="sx"><b>Локация:</b> Нидерланды, Германия, Австрия или Латвия — «чистые» и стабильные.</div></div>
<div class="stp"><div class="sn">2</div><div class="sx"><b>Сервис:</b> не Nord/Express/Surfshark (засвечены), а с протоколом VLESS-Reality или обфускацией. Идеал — свой VPS (Hetzner/OVH).</div></div>
<div class="stp"><div class="sn">3</div><div class="sx"><b>Отключите IPv6</b> в сети — иначе РФ-адрес «протечёт» в обход.</div></div>
<div class="stp"><div class="sn">4</div><div class="sx"><b>Новый Google-аккаунт</b> под включённым VPN, страна — не Россия.</div></div>
<div class="stp"><div class="sn">5</div><div class="sx"><b>Держите VPN включённым</b> всю сессию.</div></div>
</div>
<div class="stopcol"><div class="sh">чего не делать</div><div class="si">прыгать между странами в сессии</div><div class="si">выключать VPN в работе</div><div class="si">привязывать РФ-номер к аккаунту</div></div>
</div>`},

{n:"07",k:"Рублями, на ВАШ аккаунт, с защитой сделки.",t:"Оплата через посредника (FunPay) — пошагово",
b:`Та страница, ради которой стоит читать внимательно. Запомните правило: пока деньги в эскроу и пароль при Вас — Вы ничем не рискуете. Риск начинается там, где Вас уводят с площадки или просят пароль.`,
info:`<span class="cap">шесть шагов безопасной оплаты</span>
<div class="steps"><div class="stepcol">
<div class="stp"><div class="sn">1</div><div class="sx">Только <b>funpay.com</b> — не .ru (подделка-двойник). Проверьте адрес буква в букву.</div></div>
<div class="stp"><div class="sn">2</div><div class="sx">Лот <b>«активация на ВАШ аккаунт»</b>, а НЕ «готовый аккаунт». Вы остаётесь хозяйкой.</div></div>
<div class="stp"><div class="sn">3</div><div class="sx">Проверьте продавца ДО оплаты (отзывы, сделки). Переписка и оплата — <b>только внутри</b> площадки.</div></div>
</div><div class="stepcol">
<div class="stp"><div class="sn">4</div><div class="sx">Платите <b>через СБП рублями</b>. Деньги в эскроу — заморожены, пока не подтвердите получение. Комиссия от 3 %.</div></div>
<div class="stp"><div class="sn">5</div><div class="sx">Отдайте <b>только email/логин. Пароль — НИКОГДА</b> (активация его не требует).</div></div>
<div class="stp"><div class="sn">6</div><div class="sx">Убедитесь, что подписка активна — и только тогда подтверждайте. Не так — открываете спор (арбитраж).</div></div>
</div></div>`},

{n:"08",k:"От нового аккаунта до рабочего Nano Banana Pro.",t:"Регистрация Google AI Pro — пошагово",
b:`Собираем всё вместе и получаем рабочий инструмент для картинок. Чаще всего спотыкаются на шаге 2 (телефон) и шаге 4 (оплата) — оба решаемы, ни один не тупик. Если на каком-то шаге заминка — ровно для этого есть персональная консультация, где проходим всё вживую и до результата.`,
info:`<span class="cap">шесть шагов до первого кадра</span>
<div class="steps"><div class="stepcol">
<div class="stp"><div class="sn">1</div><div class="sx"><b>Включите VPN</b> на правильной локации (NL/DE/AT/LV).</div></div>
<div class="stp"><div class="sn">2</div><div class="sx"><b>Новый Google-аккаунт</b> под VPN, страна — не Россия. РФ-номер не привязывать.</div></div>
<div class="stp"><div class="sn">3</div><div class="sx">Откройте раздел подписки <b>Google AI Pro</b> — сюда входит Nano Banana Pro.</div></div>
</div><div class="stepcol">
<div class="stp"><div class="sn">4</div><div class="sx"><b>Оформите подписку</b> через посредника на этот аккаунт. ≈20 $/мес (~2000—2200 ₽).</div></div>
<div class="stp"><div class="sn">5</div><div class="sx"><b>Проверьте доступ:</b> сделайте первый кадр — простой портрет. Появился — работает.</div></div>
<div class="stp"><div class="sn">6</div><div class="sx"><b>Сохраните доступы</b> (email, пароль, восстановление) в надёжном месте.</div></div>
</div></div>`},

{n:"09",k:"Что покупать первым и сколько это в месяц.",t:"С чего начать: порядок и бюджет",
b:`Чтобы не распыляться, входим по порядку — от дешёвого и простого к серьёзному. Покупать всё сразу не нужно. Главное правило: не платите за следующий этап, пока не выжали предыдущий. Так Вы тратите ровно столько, сколько реально используете, и ни рубля вперёд на то, до чего ещё не дошли руки.`,
info:`<span class="cap">маршрут по бюджету — от пробы к видео</span>

{n:"10",k:"Субъект + Стиль + Свет + Камера + Качество.",t:"Формула промпта",
b:`Чтобы каждый раз не сочинять описание с нуля, держите в голове формулу из пяти блоков.

Субъект — кто в кадре. Не «женщина», а «элегантная женщина 45 лет, благородные черты, лёгкая улыбка». Стиль — общая эстетика: «обложка Vogue», «минимализм», «классический портрет маслом». Свет — самый недооценённый блок, именно он отличает любительский кадр от дорогого: золотой час, синий час, рембрандтовский, контровой. Камера — оптика и ракурс: «85 мм», «малая глубина резкости», «вид сверху». Качество — финал: «фотореализм», «4K», «резкость».

Главное правило доработки: правьте по ОДНОЙ детали за раз. Не нравится свет — меняете только свет. Тогда Вы видите, что именно дало эффект, и управляете результатом, а не крутите рулетку. Эту формулу легко превратить в личную заготовку: пропишите свою героиню в блоке «Субъект» и сохраните — дальше меняете только костюм, сцену и свет.`,
info:`<span class="cap">пять блоков крепкого запроса</span>
<div class="formula">
<div class="ftok"><div class="fl">субъект</div><div class="fv">женщина 45</div></div><div class="fplus">+</div>
<div class="ftok"><div class="fl">стиль</div><div class="fv">Vogue</div></div><div class="fplus">+</div>
<div class="ftok hot"><div class="fl">свет ★</div><div class="fv">золотой час</div></div><div class="fplus">+</div>
<div class="ftok"><div class="fl">камера</div><div class="fv">85 мм</div></div><div class="fplus">+</div>
<div class="ftok"><div class="fl">качество</div><div class="fv">4K</div></div>
</div>
<div class="frule">★ свет недооценён — именно он «удорожает» кадр · правьте по ОДНОЙ детали</div>`},

{n:"11",k:"Когда нужна серия и повтор одного персонажа.",t:"JSON-промпт — разбор по полям",
b:`Обычный промпт фразой хорош для одного кадра. Но когда нужна СЕРИЯ — одна героиня в десяти образах, единый стиль ленты — на помощь приходит JSON-промпт. Звучит технически, на деле это аккуратная анкета «поле: значение».

Логика простая: поля, которые должны остаться постоянными (subject, иногда camera), Вы не трогаете — и героиня узнаётся. Поля-переменные (outfit, scene) меняете — и получаете ту же женщину в новых обстоятельствах. Это переход от красивой случайности к управляемой системе. Заведите один шаблон под себя — и сборка нового кадра займёт секунды: поменяли две строки, готово.`,
info:`<span class="cap">анатомия JSON — что держать, что менять</span>
<div class="jtab">
<div class="row"><span class="k">subject</span><span class="v">женщина 45, благородные черты <span class="lock">🔒 держать</span></span></div>
<div class="row"><span class="k">outfit</span><span class="v">изумрудное платье <span class="swap">⇄ менять</span></span></div>
<div class="row"><span class="k">scene</span><span class="v">панорамное окно <span class="swap">⇄ менять</span></span></div>
<div class="row"><span class="k">lighting</span><span class="v">золотой час <span class="swap">⇄ менять</span></span></div>
<div class="row"><span class="k">camera</span><span class="v">85 мм, малая ГРИП <span class="lock">🔒 держать</span></span></div>
<div class="row"><span class="k">quality</span><span class="v">фотореализм, 4K <span class="lock">🔒 держать</span></span></div>
</div>
<div class="jhint"><span><b class="l">🔒</b> постоянное → лицо узнаётся</span><span><b class="s">⇄</b> переменное → новый образ</span></div>`},

{n:"12",k:"Готовое фото как якорь — против «дрейфа» персонажа.",t:"Image-to-image: как держать лицо и стиль",
b:`Есть проблема, с которой сталкиваются все: машина каждый раз рисует чуть другое лицо. В видео это особенно заметно — персонаж «плывёт» от секунды к секунде. Это называют дрейфом.

Решение — режим image-to-image: «из картинки в картинку». Вместо описания лица словами Вы даёте машине готовое фото как ЯКОРЬ: «вот эта женщина — а теперь покажи её в вечернем платье на террасе». Машина отталкивается от реального лица и сохраняет его.

Для видео это критично. Если оживлять «из текста», персонаж поплывёт. Если оживлять ИЗ КАРТИНКИ — Вашего опорного кадра — лицо остаётся собой на всей длине ролика. Надёжный маршрут: сначала сделали идеальный портрет картинкой (Nano Banana Pro), а уже его отдали в видео (Seedance).

Правило: чем лучше и чётче опорное фото, тем стабильнее вся серия. На размытом фото машине не за что зацепиться — и дрейф вернётся. Один раз потратьте силы на сильный якорь, и он окупится во всех следующих кадрах.`,
info:`<span class="cap">якорь-фото против дрейфа</span>
<div class="flow">
<div class="fcard fin"><div class="ftt">⚓ опорное фото</div><div class="fd">сильный чёткий кадр</div></div>
<span class="fa">→</span>
<div class="fcard"><div class="ftt">другой наряд</div><div class="fd">лицо то же</div></div>
<div class="fcard"><div class="ftt">другой фон</div><div class="fd">лицо то же</div></div>
<div class="fcard"><div class="ftt">видео</div><div class="fd">без дрейфа</div></div>
</div>
<div class="fnote">маршрут: идеальный портрет (Nano Banana Pro) → отдать в видео (Seedance)</div>`},

{n:"13",k:"Что отличает дорогой результат от любительского.",t:"Хорошо vs плохо: эталон кадра",
b:`Один и тот же инструмент в одних руках выдаёт обложку глянца, в других — картинку, по которой за версту видно нейросеть. Разница — в нескольких привычках.

Ориентир запомните такой: хороший кадр выглядит так, будто его сняла дорогая команда на дорогую технику, а не сделала программа. Ваша задача как режиссёра — убрать всё, что выдаёт машину. На практике достаточно одного беглого вопроса к готовому кадру: «что здесь выдаёт нейросеть?» — и устранить найденное.`,
info:`<span class="cap">пять привычек дорогого кадра</span>
<div class="gb">
<div class="gbcol bad"><div class="gbhd">✗ выдаёт нейросеть</div>
<div class="gbr"><span class="m">✗</span> плоский ровный свет</div>

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inl(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');}
function md(src){return src.split(/\n\n+/).map(p=>{
  if(/^\s*-\s+/.test(p)){return '<ul>'+p.split('\n').map(l=>'<li>'+inl(l.replace(/^\s*-\s+/,''))+'</li>').join('')+'</ul>';}
  return '<p>'+inl(p.replace(/\n/g,' '))+'</p>';
}).join('');}
function jhi(s){return esc(s).replace(/(&quot;[^&]*?&quot;)(\s*:)/g,'<span class="jkey">$1</span>$2').replace(/:\s*(&quot;[^&]*?&quot;)/g,': <span class="jstr">$1</span>').replace(/([{}\[\],])/g,'<span class="jpunc">$1</span>');}
