<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>CROWBAH — Вход в нейросети (персональный гид)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a10; --bg2:#0a0e17; --panel:#0d1220; --panel2:#121821;
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
  --text:#e6eaf0; --muted:#9aa6bd; --dim:#6b778f;
  --cyan:#34d3ee; --cyan2:#5fe0f5; --cyandim:#1c6675; --indigo:#5b78ff; --magenta:#ff3b6b;
  --fd:'Geologica',sans-serif; --fm:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--fd);font-weight:400;line-height:1.55;-webkit-font-smoothing:antialiased}
@page{size:A4;margin:0}
.page{position:relative;width:210mm;min-height:297mm;padding:15mm 14mm;background:var(--bg);overflow:hidden;break-after:page;page-break-after:always}
.page:last-child{break-after:auto;page-break-after:auto}
.foot{position:absolute;left:14mm;right:14mm;bottom:6mm;display:flex;justify-content:space-between;font-family:var(--fm);font-size:7.5pt;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;border-top:1px solid var(--line);padding-top:5pt}
.foot b{color:var(--cyan);font-weight:500}
h1,h2,h3,h4{font-family:var(--fd);letter-spacing:-.02em;line-height:1.05}
b,strong{color:#fff;font-weight:600} em{color:var(--cyan2);font-style:normal}
p{margin:0 0 8pt}
.kick{font-family:var(--fm);font-size:8pt;letter-spacing:.24em;text-transform:uppercase;color:var(--cyan);display:flex;align-items:center;gap:8px}
.kick::before{content:"";width:22px;height:1px;background:var(--cyan)}

/* cover */
.cover{display:flex;flex-direction:column;justify-content:center;background:radial-gradient(120% 80% at 72% 12%,rgba(52,211,238,.10),transparent 55%),var(--bg)}
.cover .net{position:absolute;inset:0;opacity:.45}
.cover .brand{font-family:var(--fd);font-weight:900;font-size:16pt;letter-spacing:.04em;position:relative}
.cover .brand .x{color:var(--cyan)}
.cover .tag{font-family:var(--fm);font-size:8pt;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-top:6pt}
.cover h1{font-weight:900;font-size:46pt;line-height:.96;margin:24pt 0 0;max-width:15ch;position:relative}
.cover h1 .x{color:var(--cyan)}
.cover .sub{font-size:13pt;color:#cdd6e4;max-width:44ch;margin-top:16pt;line-height:1.5;position:relative}
.cover .meta{position:relative;margin-top:36pt;display:flex;gap:24pt;font-family:var(--fm);font-size:8.5pt;color:var(--muted)}
.cover .meta b{color:var(--cyan);font-weight:500}

/* section head */
.shead{display:flex;align-items:flex-start;gap:16pt;margin-bottom:14pt}
.shead .no{font-family:var(--fd);font-weight:900;font-size:40pt;color:var(--cyan);line-height:.8;text-shadow:0 0 30px rgba(52,211,238,.35)}
.shead .ht{flex:1}
.shead h2{font-weight:800;font-size:21pt;margin-top:6pt;line-height:1.06}
.body{font-size:11pt;color:#d2d9e6;max-width:62ch}
.body p{margin:0 0 8pt}
.body b{color:#fff}
.body ul{margin:6pt 0 10pt;padding-left:0;list-style:none}
.body li{margin:0 0 6pt;font-size:10.6pt;color:#d2d9e6;padding-left:18pt;position:relative}
.body li::before{content:"—";position:absolute;left:0;color:var(--cyan)}

/* infographic shell */
.info{margin:16pt 0 2pt;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--bg2));padding:18pt;position:relative;overflow:hidden}
.info .cap{font-family:var(--fm);font-size:7.5pt;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:14pt;display:block}

/* mega-stat */
.megastat{text-align:center;padding:6pt 0 10pt}
.megastat .mega{font-family:var(--fd);font-weight:900;font-size:96pt;line-height:.82;color:var(--cyan);text-shadow:0 0 60px rgba(52,211,238,.4)}
.megastat .mega sup{font-size:42pt;vertical-align:super}
.megastat .megasub{font-size:11pt;color:var(--muted);margin-top:8pt}
.pipe3{display:flex;align-items:center;gap:10pt;margin-top:16pt;justify-content:center}
.pipe3 .node{flex:1;text-align:center;font-family:var(--fm);font-size:8.6pt;color:#cdd5e3;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:11pt 8pt}
.pipe3 .node.hot{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 0 1px rgba(52,211,238,.3)}
.pipe3 .arw{color:var(--cyan);font-size:16pt;font-weight:700}

/* pictogram 8/10 */
.picto{display:flex;align-items:center;gap:24pt;flex-wrap:wrap;justify-content:center}
.dots{display:flex;gap:7pt}
.dots i{width:24pt;height:24pt;border-radius:6px;background:var(--panel2);border:1px solid var(--line)}
.dots i.on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 14px rgba(52,211,238,.55)}
.bigpct{font-family:var(--fd);font-weight:900;font-size:62pt;color:var(--cyan);line-height:.9;text-shadow:0 0 40px rgba(52,211,238,.35)}
.picto .lbl{font-size:11pt;color:#cdd5e3;max-width:24ch;border-left:2px solid var(--cyan);padding-left:12pt}

/* bento */
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:64pt;gap:10pt}
.bt{border:1px solid var(--line);border-radius:12px;background:var(--panel2);padding:12pt;position:relative}
.bt.main{grid-column:span 2;grid-row:span 2;border-color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(52,211,238,.3),0 18px 36px -22px rgba(52,211,238,.5)}
.bt.dim{opacity:.55}
.bt .bn{font-weight:700;font-size:10pt;color:#fff}
.bt.main .bn{font-size:14pt}
.bt .bd{font-family:var(--fm);font-size:7.2pt;color:var(--muted);margin-top:6pt;line-height:1.5}
.bt .badge{position:absolute;top:9pt;right:9pt;font-family:var(--fm);font-size:6.6pt;letter-spacing:.06em;background:var(--cyan);color:#04121a;border-radius:5px;padding:2pt 6pt;text-transform:uppercase;font-weight:700}
.bt.dim .badge{background:transparent;color:var(--dim);border:1px solid var(--line)}
.bt .marks{display:flex;gap:6pt;flex-wrap:wrap;margin-top:10pt}
.bt .marks span{font-family:var(--fm);font-size:7pt;color:var(--cyan);border:1px solid rgba(52,211,238,.35);border-radius:999px;padding:2pt 7pt}

/* journey road */
.road{position:relative}
.roadgrid{display:flex;justify-content:space-between;gap:6pt;margin-top:6pt}
.rnode{flex:1;text-align:center}
.rnode .circ{width:30pt;height:30pt;border-radius:50%;margin:0 auto 7pt;border:1.5px solid var(--cyan);display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-weight:700;font-size:9pt;color:var(--cyan);background:var(--panel2);box-shadow:0 0 14px rgba(52,211,238,.35)}
.rnode .rt{font-family:var(--fm);font-size:7.4pt;color:#cdd5e3;line-height:1.4}
.shops{display:flex;gap:8pt;margin-top:16pt;justify-content:center;flex-wrap:wrap}
.shop{font-family:var(--fm);font-size:8pt;color:#cdd5e3;border:1px solid var(--line);border-radius:8px;padding:8pt 12pt}
.shop.rec{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 0 1px rgba(52,211,238,.3)}

/* VS split */
.vs{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:stretch}
.vscol{padding:4pt 14pt}
.vscol.alt{border:1px solid var(--cyan);border-radius:12px;box-shadow:inset 0 0 0 1px rgba(52,211,238,.25)}
.vscol.dimcol{opacity:.62}
.vshd{font-weight:700;font-size:11pt;margin-bottom:10pt}
.vscol.alt .vshd{color:var(--cyan)}
.vsrow{display:flex;align-items:center;gap:8pt;font-size:9.4pt;color:#cdd5e3;padding:6pt 0;border-bottom:1px solid var(--line)}
.vsrow:last-child{border-bottom:0}
.vsrow .ic{font-family:var(--fm);font-size:8pt;min-width:20pt;flex:none;color:var(--cyan);white-space:nowrap}
.vsmid{display:flex;align-items:center;padding:0 10pt}
.vsmid span{font-family:var(--fd);font-weight:900;font-size:13pt;color:var(--dim);writing-mode:vertical-rl;text-orientation:upright;letter-spacing:-2pt}
.note{margin-top:12pt;font-size:8.6pt;color:var(--dim);text-align:center}

/* formula tokens */
.formula{display:flex;align-items:stretch;gap:7pt;flex-wrap:wrap;justify-content:center}
.ftok{border:1px solid var(--cyandim);border-radius:10px;padding:9pt 11pt;text-align:center;min-width:74pt;background:var(--panel2)}
.ftok .fl{font-family:var(--fm);font-size:6.8pt;letter-spacing:.06em;text-transform:uppercase;color:var(--cyan)}
.ftok .fv{font-size:8.6pt;color:#fff;margin-top:4pt}
.fplus{display:flex;align-items:center;color:var(--cyan);font-weight:700;font-size:13pt}
.fresult{margin-top:14pt;font-family:var(--fm);font-size:8.6pt;color:#dbe6ef;background:var(--panel2);border-left:2px solid var(--cyan);border-radius:0 8px 8px 0;padding:11pt 13pt;line-height:1.55}

/* good vs bad */
.gb{display:grid;grid-template-columns:1fr 1fr;gap:0}
.gbcol{padding:6pt 14pt}
.gbcol.bad{opacity:.55;border-right:1px solid var(--line)}
.gbhd{font-family:var(--fm);font-size:8pt;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8pt}
.gbcol.bad .gbhd{color:var(--dim)} .gbcol.good .gbhd{color:var(--cyan)}
.gbq{font-family:var(--fm);font-size:8.2pt;color:#cdd5e3;background:var(--panel2);border-radius:8px;padding:9pt;line-height:1.5;min-height:54pt}
.gbcrit{margin-top:10pt}
.gbcr{display:flex;gap:7pt;font-size:8.8pt;color:#cdd5e3;padding:4pt 0}
.gbcr .m{font-family:var(--fm);width:14pt}
.gbcol.bad .gbcr .m{color:var(--dim)} .gbcol.good .gbcr .m{color:var(--cyan)}

/* flow */
.flow{display:flex;align-items:stretch;gap:8pt;flex-wrap:wrap}
.fcard{flex:1;min-width:96pt;border:1px solid var(--line);border-radius:10px;background:var(--panel2);padding:11pt}
.fcard.fin{border-color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(52,211,238,.3)}
.fcard .fn{font-family:var(--fm);font-size:7pt;color:var(--cyan)}
.fcard .ftt{font-weight:600;font-size:9pt;color:#fff;margin-top:5pt}
.fsig{font-family:var(--fm);font-size:8.4pt;color:var(--muted);margin-top:14pt;text-align:center}
.fsig b{color:var(--cyan)}

/* prompts */
.pcard{border:1px solid var(--line);border-radius:10px;background:var(--panel);margin:0 0 9pt;overflow:hidden}
.pcard .ph{display:flex;justify-content:space-between;align-items:center;padding:8pt 12pt;border-bottom:1px solid var(--line);background:var(--panel2)}
.pcard .pl{font-weight:600;font-size:9.4pt;color:#fff}
.pcard .copy{font-family:var(--fm);font-size:7pt;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(52,211,238,.4);border-radius:5px;padding:2pt 7pt}
.pcard pre{font-family:var(--fm);font-size:8.2pt;line-height:1.5;color:#dbe6ef;padding:10pt 12pt;white-space:pre-wrap;word-break:break-word}
.jkey{color:var(--cyan)} .jstr{color:#cfe9c2} .jpunc{color:var(--dim)}
.split2{display:grid;grid-template-columns:1fr 1fr;gap:10pt;margin-top:6pt}
@media print{.split2{grid-template-columns:1fr}}

/* offer */
.offer{display:flex;flex-direction:column;gap:9pt;margin-top:6pt}
.orow{border:1px solid var(--line);border-radius:10px;padding:13pt 16pt;background:var(--panel2);display:flex;justify-content:space-between;align-items:flex-start;gap:14pt}
.orow.hot{border-color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(52,211,238,.3)}
.orow .ot{font-weight:700;font-size:12pt;color:#fff}
.orow .ot small{font-family:var(--fm);font-size:7pt;color:var(--cyan);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:3pt}
.orow .od{font-size:9.2pt;color:var(--muted);margin-top:4pt;max-width:62ch}
.orow .op{font-family:var(--fd);font-weight:900;font-size:19pt;color:var(--cyan);white-space:nowrap;text-align:right}
.orow .op small{font-size:9pt;color:var(--muted);font-weight:500;display:block}
.contact{margin-top:16pt;border-top:1px solid var(--line);padding-top:14pt;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10pt}
.contact .who2{font-weight:700;font-size:12pt}.contact .who2 .x{color:var(--cyan)}
.contact .lk{font-family:var(--fm);font-size:9pt;color:#cdd5e3}.contact .lk b{color:var(--cyan)}
.disc{font-size:8.6pt;color:var(--dim);margin-top:10pt;line-height:1.55}
</style>
</head>
<body>
<div id="doc"></div>
<script>
const G = {
  cover_h1:"Вход в нейросети",
  cover_accent:"нейросети",
  subtitle:"Персональный гид. Картинки и видео мирового уровня — на вашем компьютере, под вашим контролем. Без лишних слов, только рабочий маршрут.",
  sections:[
    { number:"01", kicker:"С чего всё начинается", title:"Что такое нейросеть — за 20 секунд",
      body:`Нейросеть — это не магия и не «искусственный разум». Это **очень большой угадыватель**: вы описываете словами желаемое — она достраивает картинку или видео по миллиардам примеров, на которых обучалась.

Вам не нужно понимать, *как* она устроена внутри. Нужно понять одно: **качество результата равно качеству вашего описания**. Это всё, что отделяет любителя от профессионала. Этому и учит гид.`,
      info:`<span class="cap">масштаб, который работает на вас</span>
        <div class="megastat">
          <div class="mega">10<sup>12</sup></div>
          <div class="megasub">столько связей внутри модели — вам не нужно знать ни одной из них</div>
        </div>
        <div class="pipe3">
          <div class="node">вы пишете словами</div><span class="arw">→</span>
          <div class="node">модель достраивает</div><span class="arw">→</span>
          <div class="node hot">готовый кадр</div>
        </div>` },

    { number:"02", kicker:"Главный принцип", title:"Решает не инструмент. Решает описание",
      body:`Большинство людей винят «слабую нейросеть». На деле слабым был **запрос**. Один и тот же инструмент в руках двух людей даёт небо и землю — разница только в том, насколько точно сформулировано задание.

Поэтому порядок в гиде такой: сначала **два лучших инструмента** под ваши задачи, затем — **как с ними разговаривать**, чтобы результат был как с обложки.`,
      info:`<span class="cap">что на самом деле решает результат</span>
        <div class="picto">
          <div>
            <div class="dots">${'<i class="on"></i>'.repeat(8)}${'<i></i>'.repeat(2)}</div>
            <div class="bigpct" style="margin-top:12pt">80%</div>
          </div>
          <div class="lbl">результата решает формулировка запроса, а не цена подписки</div>
        </div>` },

    { number:"03", kicker:"Картинки", title:"Nano Banana Pro — ваш инструмент №1 по изображениям",
      body:`Из всего, что есть на рынке в 2026 году, для вас это **лучший выбор по картинкам**. Почему именно он:

- **Понимает текст внутри картинки** — читаемые надписи, заголовки, подписи.
- **Держит ваш стиль** от кадра к кадру — лицо, бренд, цвета не «плывут».
- **До 4K** — годится в печать, не только в экран.

Входит в подписку **Google AI Pro** — около **2 000–2 200 ₽/мес**. ChatGPT и Midjourney хороши, но для вас это **второй эшелон**.`,
      info:`<span class="cap">приоритет по картинкам</span>
        <div class="bento">
          <div class="bt main"><span class="badge">≈2000 ₽/мес</span><div class="bn">Nano Banana Pro</div><div class="bd">лучший выбор №1 по изображениям</div><div class="marks"><span>текст в кадре</span><span>стиль не плывёт</span><span>до 4K</span></div></div>
          <div class="bt dim"><span class="badge">вторично</span><div class="bn">ChatGPT Image</div><div class="bd">удобно, если уже платите за ChatGPT</div></div>
          <div class="bt dim"><span class="badge">вторично</span><div class="bn">Midjourney</div><div class="bd">свой язык, очень красиво — для арт-эстетики</div></div>
        </div>` },

    { number:"04", kicker:"Видео", title:"Seedance — ваш инструмент №1 по видео",
      body:`Для видео берём **Seedance** — один из самых сильных генераторов движущейся картинки: оживляет ваше фото, держит сцену стабильной, понимает команды по камере, умеет звук.

Напрямую из России Seedance не открывается — поэтому работаем через **зарубежную платформу-витрину**, где он уже встроен.

Порядок простой: **сначала картинки** (Nano Banana Pro — дешевле распробовать), **параллельно — видео-пробы** на Seedance.`,
      info:`<span class="cap">маршрут до готового ролика</span>
        <svg viewBox="0 0 620 70" style="width:100%;height:48pt;margin-bottom:4pt"><path d="M10,55 C120,5 200,5 310,35 C420,65 500,65 610,15" fill="none" stroke="#34d3ee" stroke-width="1.6" stroke-dasharray="2 6" opacity=".7"/></svg>
        <div class="roadgrid">
          <div class="rnode"><div class="circ">01</div><div class="rt">идея</div></div>
          <div class="rnode"><div class="circ">02</div><div class="rt">кадр-основа<br>(из разд. 03)</div></div>
          <div class="rnode"><div class="circ">03</div><div class="rt">Seedance<br>оживляет</div></div>
          <div class="rnode"><div class="circ">04</div><div class="rt">камера<br>и звук</div></div>
          <div class="rnode"><div class="circ">05</div><div class="rt">готовый<br>ролик</div></div>
        </div>
        <div class="shops">
          <div class="shop rec">Higgsfield · $15/мес ★</div>
          <div class="shop">Dreamina · $20/мес · free-пробы</div>
          <div class="shop">Freepik · $10/мес</div>
        </div>` },

    { number:"05", kicker:"Покупка — без боли", title:"Как оплатить из России. Спокойно и безопасно",
      body:`Здесь застревают все. На деле — два простых шага, и доступ у вас в руках за вечер.

- **Шаг 1. VPN** — нужен, только чтобы сайт открылся. «Чистый» европейский (Нидерланды/Германия), держите включённым в работе.
- **Шаг 2. Оплата на ВАШ аккаунт через защищённого посредника** — площадка с защитой сделки: деньги заморожены, пока вы не подтвердите, что всё работает. Платите рублями, отдаёте только **логин-почту — никогда пароль**.

Не хотите вникать? **Я настраиваю всё под ключ** — вы получаете готовый рабочий аккаунт и не касаетесь технической части.`,
      info:`<span class="cap">два пути к доступу</span>
        <div class="vs">
          <div class="vscol dimcol">
            <div class="vshd">Самостоятельно</div>
            <div class="vsrow"><span class="ic">●●○</span> Настроить VPN</div>
            <div class="vsrow"><span class="ic">●●●</span> Выбрать лот у посредника</div>
            <div class="vsrow"><span class="ic">●●○</span> Проверить аккаунт</div>
            <div class="vsrow"><span class="ic">~вечер</span> Время</div>
            <div class="vsrow"><span class="ic">?</span> Спокойствие</div>
          </div>
          <div class="vsmid"><span>VS</span></div>
          <div class="vscol alt">
            <div class="vshd">Под ключ со мной</div>
            <div class="vsrow"><span class="ic">✓</span> VPN настроен</div>
            <div class="vsrow"><span class="ic">✓</span> Аккаунт активирован</div>
            <div class="vsrow"><span class="ic">✓</span> Проверено при вас</div>
            <div class="vsrow"><span class="ic">~час</span> Время</div>
            <div class="vsrow"><span class="ic">✓</span> Полное</div>
          </div>

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<em>$1</em>');}
function md(src){
  const L=src.split('\n');let h='',i=0;
  while(i<L.length){let ln=L[i];
    if(/^\s*$/.test(ln)){i++;continue;}
    if(/^\s*-\s+/.test(ln)){let t='<ul>';while(i<L.length&&/^\s*-\s+/.test(L[i])){t+='<li>'+inline(L[i].replace(/^\s*-\s+/,''))+'</li>';i++;}h+=t+'</ul>';continue;}
    let p=ln;i++;while(i<L.length&&!/^\s*$/.test(L[i])&&!/^\s*-\s+/.test(L[i])){p+=' '+L[i];i++;}
    h+='<p>'+inline(p)+'</p>';
  }
  return h;
}
function jsonHi(s){return esc(s).replace(/(&quot;[^&]*?&quot;)(\s*:)/g,'<span class="jkey">$1</span>$2').replace(/:\s*(&quot;[^&]*?&quot;)/g,': <span class="jstr">$1</span>').replace(/([{}\[\],])/g,'<span class="jpunc">$1</span>');}
