.p2{border-left:3px solid var(--cyan)} .p2 .n{color:var(--cyan)} .p2 .tagr{color:var(--cyan);border:1px solid rgba(52,211,238,.4)}
.p3{border-left:3px solid var(--magenta)} .p3 .n{color:var(--magenta)} .p3 .tagr{color:var(--magenta);border:1px solid rgba(255,59,107,.4)}
.stop{margin-top:10pt;border:1px solid rgba(255,59,107,.35);background:rgba(255,59,107,.06);border-radius:8px;padding:9pt 12pt;font-size:9pt;color:#f3c2cd}

.funnel{display:flex;flex-direction:column;gap:7pt}
.fr{border:1px solid var(--line);border-radius:8px;padding:10pt 13pt;background:var(--panel2);display:flex;justify-content:space-between;align-items:center;margin:0 auto;width:100%}

.proof .pn{font-family:var(--fd);font-weight:900;font-size:14pt;color:var(--cyan);white-space:nowrap}

.pcard .pl{font-weight:600;font-size:9.4pt;color:#fff}
.pcard .copy{font-family:var(--fm);font-size:7pt;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(52,211,238,.4);border-radius:5px;padding:2pt 7pt}
.pcard pre{font-family:var(--fm);font-size:8.2pt;line-height:1.5;color:#dbe6ef;padding:10pt 12pt;white-space:pre-wrap;word-break:break-word}
.pcard pre.json{color:#cdd5e3}
.jkey{color:var(--cyan)} .jstr{color:#cfe9c2} .jpunc{color:var(--dim)}

/* offer page */
.offer{display:flex;flex-direction:column;gap:10pt;margin-top:6pt}
.orow{border:1px solid var(--line);border-radius:10px;padding:14pt 16pt;background:var(--panel2);display:flex;justify-content:space-between;align-items:flex-start;gap:14pt}

.orow .ol .ot{font-weight:700;font-size:12pt;color:#fff}
.orow .ol .od{font-size:9.4pt;color:var(--muted);margin-top:4pt;max-width:60ch}
.orow .op{font-family:var(--fd);font-weight:900;font-size:20pt;color:var(--cyan);white-space:nowrap}

.contact{margin-top:16pt;border-top:1px solid var(--line);padding-top:14pt;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10pt}

.contact .lk{font-family:var(--fm);font-size:9pt;color:#cdd5e3}
.contact .lk b{color:var(--cyan)}
.disc{font-size:8.6pt;color:var(--dim);margin-top:10pt;line-height:1.5}
</style>
</head>

    { number:"01", kicker:"С чего вообще всё это", title:"Что такое нейросеть простыми словами и что ты сделаешь уже сегодня",
      body:`Нейросеть — это программа, которой ты описываешь словами, что хочешь увидеть, а она это рисует или снимает. Пишешь «рыжая девушка у окна кафе, утренний свет» — получаешь фотографию, которой не существовало. Без фотошопа, без камеры. Только текст и пара минут.

Тебе не нужно понимать про «искусственный интеллект» и «алгоритмы». Нейросеть — это инструмент, как утюг или микроволновка. Чтобы погладить рубашку, ты не разбираешься, как устроен утюг внутри.

**Что ты сможешь делать:**

- **Картинки из головы.** Любая сцена, портрет, предмет, открытка — словами. Бесплатно, за минуту.
- **Оживлять свои фото.** Загружаешь снимок — нейросеть делает из него короткое видео: человек улыбается, поворачивает голову, моргает.
- **Посты и визуал для соцсетей.** Аватарки, обложки, картинки под текст, карточки товара для маркетплейса.
- **Поток контента.** Когда освоишься — канал, где картинки и ролики выходят пачками в одном стиле, без съёмок и фотографа.

**Это можно осваивать вдвоём с дочкой.** Детям заходит быстрее — для них это игра. Первую картинку делаете вместе за один вечер. Дальше она будет учить тебя.

Главное, что мешает прямо сейчас, — не сложность, а два технических барьера: часть лучших нейросетей не открывается из России и не принимает наши карты. Гайд проведёт мимо обоих. Сначала — то, что работает бесплатно и без обходов. Потом — как платить, когда захочешь больше.`,
      info:`<span class="cap">было → стало</span>
      <div class="flow-ba">
        <div class="tok"><span class="q">«рыжая девушка у окна кафе, утренний свет»</span></div>

    { number:"02", kicker:"Картинки", title:"С какой нейросети начать: бесплатно, по-русски, фотореалистично",
      body:`Не распыляйся. Для старта есть один лучший инструмент, и он бесплатный.

**Google Nano Banana 2** — нейросеть для картинок внутри приложения Gemini от Google. На июнь 2026 это самая удобная точка входа для новичка-визуальщика. Почему именно она:

**Что нужно для бесплатного старта:** VPN и Google-аккаунт. Это два разных шага — про оба в разделе 05. Для бесплатных картинок в сутки оплата НЕ нужна. Это и делает Nano Banana 2 самым дешёвым входом — ноль рублей.

**Внутри Google две модели — не путай:**

| | Nano Banana 2 | Nano Banana Pro |

| Текст на картинке | средне | лучший |

**Когда пригодятся другие:** **ChatGPT** — если уже платишь за него и хочешь всё в одном окне (подписка $20/мес ≈ 2 000 ₽). **Midjourney** — про художественную красоту уровня портфолио, не про точность (старт $10/мес), бери вторым, когда захочется «вау»-эстетики.

**Вывод:** начни с бесплатного Nano Banana 2. Докупай остальное, только когда упрёшься в его потолок, не раньше.`,
      info:`<span class="cap">четыре инструмента для картинок</span>

    { number:"03", kicker:"Видео", title:"Оживить фото и снять ролик: с чего начать без VPN",
      body:`Видео — следующий шаг после картинок. Приятная новость: лучший стартовый инструмент открывается из России без обходов.

**Kling AI** — китайский видеогенератор. Чем хорош для тебя:

- **Сайт kling.ai открывается из РФ без VPN.** Регистрация по email или через Google за пару минут.
- **Бесплатный тариф — 66 кредитов в день.** Хватает потренироваться: два-три коротких ролика в день.
- **Лучшая мимика при оживлении фото.** Загружаешь портрет — человек улыбается, поворачивает голову, в глазах живые эмоции. Это твой главный сценарий.

**Полностью бесплатно и без VPN — российские сервисы для первых проб:** **Шедеврум (Яндекс)** — видео из фото без водяного знака, в приложении на телефоне. **Fusion Brain / Kandinsky (Сбер)** — видео из текста и фото на русском, ролики до 5 секунд, формат 9:16 под Reels.

**Что есть дальше — для справки, не для старта:** **Google Veo 3** — самое кинематографичное видео и лучший звук, но доступ из РФ сложный (реальнее через агрегатор). **Seedance** — качество выше Kling и длиннее, но глобальная версия может не пропустить фото с реальным лицом — для своего портрета надёжнее Kling.`,

    { number:"04", kicker:"Промпты", title:"Как разговаривать с нейросетью: формула из пяти частей",
      body:`Промпт — это твоё описание словами того, что хочешь увидеть. Главное правило: **что не назовёшь — нейросеть выберет за тебя, и выберет скучно-среднее.** Поэтому описывай по пяти ячейкам в одном предложении.

**Формула из пяти частей:**

1. **Субъект** — кто или что. Конкретно: не «женщина», а «рыжеволосая девушка 25 лет в льняном платье». Всегда **первым** — нейросеть сильнее слушает начало.
2. **Стиль** — фотография, акварель, 3D-рендер, аниме, масло.
3. **Свет** — золотой час, мягкий боковой, неон. Самая недооценённая ячейка: именно свет отличает «дёшево» от «дорого».
4. **Цвет, палитра** — «тёплые земляные тона с одним красным акцентом».
5. **Композиция, камера** — крупный план, размытый фон, вид сверху.

Длина 20–60 слов — золотая середина.

**Главная привычка новичка — правка по одной детали.** Если «почти, но не то» — НЕ переписывай весь промпт. Меняй одно слово и генерируй снова. Так за две-три правки доходишь до идеала и понимаешь, какое слово на что влияет.

**JSON-промпт — для следующего уровня.** Это тот же промпт, разложенный по полочкам: не одно предложение, а список «поле: значение». Программировать НЕ нужно. Зачем он: меньше отсебятины, можно менять одно поле, повторяемость — та же героиня выглядит одинаково в серии. Бери JSON **не сразу**, а когда нужна серия в одном стиле. Лучше всех его понимают Nano Banana Pro и Flux.

**Image-to-image — даёшь фото как основу.** Вместо описания словами загружаешь готовое фото — нейросеть строит результат поверх. Для видео это спасение от «дрейфа»: с фото-якорем персонаж держится одинаковым весь ролик. Готовые промпты — на следующей странице.`,

      body:`Главная боль не в том, чтобы зайти, а в том, чтобы **заплатить**. Российские карты не проходят почти нигде: платёжная система Stripe режет наши карты по их коду, а не по тому, откуда заходишь. Один VPN тут не спасает. Три рабочих пути от простого к сложному.

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>');}
function md(src){
  const L=src.split('\n');let h='',i=0;
  while(i<L.length){let ln=L[i];
    if(/^\s*$/.test(ln)){i++;continue;}
    if(/^\s*\|/.test(ln)){const rows=[];while(i<L.length&&/^\s*\|/.test(L[i])){rows.push(L[i]);i++;}
      const pr=r=>r.trim().replace(/^\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
      let t='<table><thead><tr>'+pr(rows[0]).map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>';
      for(let r=2;r<rows.length;r++)t+='<tr>'+pr(rows[r]).map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>';
      h+=t+'</tbody></table>';continue;}
    if(/^\s*---\s*$/.test(ln)){h+='<hr>';i++;continue;}
    if(/^##\s+/.test(ln)){h+='<h4>'+inline(ln.replace(/^##\s+/,''))+'</h4>';i++;continue;}
    if(/^\s*-\s+/.test(ln)){let t='<ul>';while(i<L.length&&/^\s*-\s+/.test(L[i])){t+='<li>'+inline(L[i].replace(/^\s*-\s+/,''))+'</li>';i++;}h+=t+'</ul>';continue;}
    if(/^\s*\d+\.\s+/.test(ln)){let t='<ol>';while(i<L.length&&/^\s*\d+\.\s+/.test(L[i])){t+='<li>'+inline(L[i].replace(/^\s*\d+\.\s+/,''))+'</li>';i++;}h+=t+'</ol>';continue;}
    let p=ln;i++;while(i<L.length&&!/^\s*$/.test(L[i])&&!/^\s*[-|#]/.test(L[i])&&!/^\s*\d+\.\s+/.test(L[i])){p+=' '+L[i];i++;}
    h+='<p>'+inline(p)+'</p>';
  }
  return h;
}
function jsonHi(s){
  return esc(s)
    .replace(/(&quot;[^&]*?&quot;)(\s*:)/g,'<span class="jkey">$1</span>$2')
    .replace(/:\s*(&quot;[^&]*?&quot;)/g,': <span class="jstr">$1</span>')
    .replace(/([{}\[\],])/g,'<span class="jpunc">$1</span>');
}
